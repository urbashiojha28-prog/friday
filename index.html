<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>J.A.R.V.I.S | OMNI-RECON</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Share+Tech+Mono&display=swap');
:root { --c: #00f0ff; --g: #0b0; --r: #f25; --bg: #000205; --glow: 0 0 15px rgba(0,240,255,0.7); }
* { margin:0; padding:0; box-sizing:border-box; overflow:hidden; }
body { background:var(--bg); color:var(--c); font-family:'Share Tech Mono', monospace; }

/* ═══ GLOBAL FX ═══ */
#app::after {
  content:""; position:fixed; inset:0; pointer-events:none;
  background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.2) 50%), linear-gradient(90deg, rgba(255,0,0,0.05), rgba(0,255,0,0.02), rgba(0,0,255,0.05));
  background-size: 100% 2px, 3px 100%; z-index:1000;
}

/* ═══ HOLOGRAPHIC OBJECTS ═══ */
.fo {
  position: absolute; border: 1px solid var(--c); background: rgba(0,20,40,0.4);
  backdrop-filter: blur(15px); min-width: 150px; z-index: 10; padding: 2px;
  box-shadow: var(--glow); clip-path: polygon(0 5%, 5% 0, 100% 0, 100% 95%, 95% 100%, 0 100%);
  animation: glitch-border 4s infinite;
}
@keyframes glitch-border { 0%, 100% { border-color: var(--c); } 50% { border-color: var(--r); } }

.fbar { display:flex; padding:6px; background:rgba(0,240,255,0.1); cursor:move; font-size:9px; letter-spacing:2px; }
.fbody { padding:15px; position:relative; }
.ft { font-size: 24px; font-family:'Orbitron'; text-shadow: 0 0 10px var(--c); outline:none; }
.fo img { width:100%; filter: contrast(1.2) sepia(0.5) hue-rotate(140deg); pointer-events:none; }

/* ═══ UI PANELS ═══ */
#video { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; transform:scaleX(-1); opacity:0.25; filter: contrast(1.5); }
canvas { position:absolute; inset:0; pointer-events:none; z-index:5; }

#terminal {
  position:absolute; bottom:20px; right:20px; width:300px; height:180px;
  background:rgba(0,0,0,0.8); border:1px solid var(--g); padding:10px;
  font-size:10px; color:var(--g); overflow:hidden; line-height:1.2;
}

#toolbar {
  position:absolute; left:20px; top:50%; transform:translateY(-50%);
  display:flex; flex-direction:column; gap:15px; z-index:101;
}
.tool-btn {
  width:60px; height:60px; background:rgba(0,0,0,0.8); border:1px solid var(--c);
  color:var(--c); cursor:pointer; font-family:'Orbitron'; transition: 0.2s;
}
.tool-btn:hover, .tool-btn.active { background:var(--c); color:#000; box-shadow: 0 0 30px var(--c); }

#vitals { position:absolute; top:20px; left:20px; font-size:12px; letter-spacing:3px; }

#intro {
  position:fixed; inset:0; background:#000; z-index:2000; display:flex; flex-direction:column;
  align-items:center; justify-content:center; cursor:pointer;
}
#iLogo { font-family:'Orbitron'; font-size:80px; color:var(--c); text-shadow: var(--glow); letter-spacing:20px; }
</style>
</head>
<body>

<div id="intro" onclick="bootSystem()">
  <div id="iLogo">JARVIS</div>
  <div style="letter-spacing:10px; color:var(--r); margin-top:20px;">[ INITIATE OMNI_LINK ]</div>
</div>

<div id="app">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="bgCvs"></canvas>
  <canvas id="fxCvs"></canvas>
  
  <div id="vitals">
    LINK: <span id="lStatus" style="color:var(--r)">OFFLINE</span><br>
    THREAT_LVL: <span style="color:var(--g)">MINIMAL</span>
  </div>

  <div id="toolbar">
    <button class="tool-btn active" id="btnDraw" data-t="draw">DRAW</button>
    <button class="tool-btn" id="btnErase" data-t="erase">DEL</button>
    <button class="tool-btn" id="btnText">TEXT</button>
    <button class="tool-btn" id="btnImg">FILE</button>
    <button class="tool-btn" id="btnClear">PURGE</button>
  </div>

  <div id="terminal"></div>
  <div id="objects-root"></div>
</div>

<input type="file" id="fileIn" hidden accept="image/*">

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
/** ◈ SYSTEM ENGINE ◈ **/
const s = { tool:'draw', color:'#00f0ff', pts:[], particles:[], lastDist:999, h:{x:0,y:0} };
const fxCvs = document.getElementById('fxCvs'), fxCtx = fxCvs.getContext('2d');
const bgCvs = document.getElementById('bgCvs'), bgCtx = bgCvs.getContext('2d');
const term = document.getElementById('terminal');

function resize() {
  bgCvs.width = fxCvs.width = window.innerWidth;
  bgCvs.height = fxCvs.height = window.innerHeight;
}
window.onresize = resize; resize();

function log(t) {
  const d = document.createElement('div');
  d.textContent = `[${Math.random().toString(16).slice(2,8)}] ${t}`;
  term.prepend(d); if(term.children.length > 15) term.lastChild.remove();
}

function speak(t) {
  const m = new SpeechSynthesisUtterance(t);
  const v = window.speechSynthesis.getVoices();
  m.voice = v.find(x => x.name.includes('Google UK English Male')) || v[0];
  m.rate = 1.1; window.speechSynthesis.speak(m);
}

/** ◈ NEBULA PARTICLE ENGINE ◈ **/
class Particle {
  constructor(x,y) {
    this.x = x; this.y = y;
    this.vx = (Math.random()-0.5) * 25;
    this.vy = (Math.random()-0.5) * 25;
    this.life = 1.0;
    this.c = Math.random() > 0.5 ? '#00f0ff' : '#fff';
  }
  update() { this.x += this.vx; this.y += this.vy; this.life -= 0.02; }
  draw() {
    fxCtx.globalAlpha = this.life;
    fxCtx.fillStyle = this.c;
    fxCtx.beginPath(); fxCtx.arc(this.x, this.y, 3 * this.life, 0, Math.PI*2); fxCtx.fill();
  }
}

function triggerNebula(x,y) {
  speak("Energy surge detected. Nebula protocol active.");
  log("CRITICAL_COLLISION_DETECTION");
  for(let i=0; i<80; i++) s.particles.push(new Particle(x,y));
}

/** ◈ ULTRON ENERGY FLOW ◈ **/
function drawBridge(p1, p2) {
  const d = Math.hypot(p2.x-p1.x, p2.y-p1.y);
  
  // Clap logic
  if(d < 70 && s.lastDist > 120) triggerNebula((p1.x+p2.x)/2, (p1.y+p2.y)/2);
  s.lastDist = d;

  fxCtx.save();
  fxCtx.strokeStyle = d < 150 ? '#f25' : '#00f0ff';
  fxCtx.lineWidth = 2;
  fxCtx.shadowBlur = 15; fxCtx.shadowColor = fxCtx.strokeStyle;
  
  fxCtx.beginPath();
  fxCtx.moveTo(p1.x, p1.y);
  // Jagged arc
  for(let i=0; i<10; i++) {
    const t = i/10;
    const x = p1.x + (p2.x-p1.x)*t + (Math.random()-0.5)*30;
    const y = p1.y + (p2.y-p1.y)*t + (Math.random()-0.5)*30;
    fxCtx.lineTo(x,y);
  }
  fxCtx.lineTo(p2.x, p2.y);
  fxCtx.stroke();
  fxCtx.restore();
}

/** ◈ HAND TRACKING ◈ **/
function onResults(res) {
  fxCtx.clearRect(0,0,fxCvs.width,fxCvs.height);
  
  // Update particles
  s.particles.forEach((p,i) => { p.update(); p.draw(); if(p.life<=0) s.particles.splice(i,1); });

  if(!res.multiHandLandmarks?.length) return;
  document.getElementById('lStatus').textContent = "ACTIVE";
  document.getElementById('lStatus').style.color = "var(--g)";

  if(res.multiHandLandmarks.length >= 2) {
    drawBridge(gp(res.multiHandLandmarks[0][9]), gp(res.multiHandLandmarks[1][9]));
  }

  const h = res.multiHandLandmarks[0];
  const p = gp(h[8]);
  // Smoothing
  s.h.x = s.h.x*0.7 + p.x*0.3; s.h.y = s.h.y*0.7 + p.y*0.3;

  const gest = (h[8].y < h[6].y && h[12].y > h[10].y) ? 'draw' : 'hover';

  if(gest === 'draw' && s.tool === 'draw') {
    if(s.lp) {
      bgCtx.strokeStyle = s.color; bgCtx.lineWidth = 6; bgCtx.lineCap = 'round';
      bgCtx.beginPath(); bgCtx.moveTo(s.lp.x, s.lp.y); bgCtx.lineTo(s.h.x, s.h.y); bgCtx.stroke();
    }
    s.lp = {...s.h};
  } else { s.lp = null; }

  // Draw HUD Crosshair
  fxCtx.strokeStyle = s.color;
  fxCtx.strokeRect(s.h.x-20, s.h.y-20, 40, 40);
  fxCtx.beginPath(); fxCtx.moveTo(s.h.x-30, s.h.y); fxCtx.lineTo(s.h.x+30, s.h.y);
  fxCtx.moveTo(s.h.x, s.h.y-30); fxCtx.lineTo(s.h.x, s.h.y+30); fxCtx.stroke();
}

function gp(lm) { return { x: (1-lm.x)*fxCvs.width, y: lm.y*fxCvs.height }; }

/** ◈ OBJECT LOGIC ◈ **/
function makeObj(type, content) {
  const el = document.createElement('div');
  el.className = 'fo'; el.style.left = '20%'; el.style.top = '20%';
  el.innerHTML = `<div class="fbar">NEXUS_STREAM_${type.toUpperCase()}</div>
    <div class="fbody">${type==='text'?`<div class="ft" contenteditable="true">${content}</div>`:`<img src="${content}">`}</div>`;
  document.getElementById('objects-root').appendChild(el);
  
  let d = false, sx, sy, sl, st;
  el.onpointerdown = e => { if(e.target.className==='fbar'){d=true; sx=e.clientX; sy=e.clientY; sl=el.offsetLeft; st=el.offsetTop; el.setPointerCapture(e.pointerId);}};
  window.addEventListener('pointermove', e => { if(d){ el.style.left=(sl+e.clientX-sx)+'px'; el.style.top=(st+e.clientY-sy)+'px'; }});
  window.addEventListener('pointerup', () => d=false);
  log(`LOADED_${type.toUpperCase()}`);
}

function bootSystem() {
  document.getElementById('intro').style.display = 'none';
  const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
  hands.setOptions({maxNumHands:2, modelComplexity:1, minDetectionConfidence:0.6});
  hands.onResults(onResults);
  const cam = new Camera(document.getElementById('video'), { onFrame: async() => await hands.send({image:document.getElementById('video')}), width:1280, height:720 });
  cam.start();
  speak("Omni-Recon initialized. Workspace is ready for deployment.");
}

/** ◈ TOOL WIRING ◈ **/
document.getElementById('btnText').onclick = () => makeObj('text', 'STARK_DATA_BLOCK');
document.getElementById('btnImg').onclick = () => document.getElementById('fileIn').click();
document.getElementById('fileIn').onchange = e => { const r = new FileReader(); r.onload=v=>makeObj('image', v.target.result); r.readAsDataURL(e.target.files[0]); };
document.getElementById('btnClear').onclick = () => { bgCtx.clearRect(0,0,bgCvs.width,bgCvs.height); document.getElementById('objects-root').innerHTML=''; speak("System purged."); };
document.querySelectorAll('.tool-btn[data-t]').forEach(b => b.onclick = () => { s.tool=b.dataset.t; document.querySelectorAll('.tool-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); });

</script>
</body>
</html>
